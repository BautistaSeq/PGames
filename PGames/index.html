<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: "Segoe UI", Arial, sans-serif;
    background: #0f0f0f;
    color: #fff;
    cursor: url("cursor.png") 0 0, auto;
}

/* ===== BANNER ===== */
.banner {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #111;
    padding: 15px 30px;
    border-bottom: 2px solid #ff3c00;
}

.logo img {
    height: 50px;
    transform: scale(2);
    transform-origin: left center;
}

/* DERECHA */
.right {
    display: flex;
    gap: 10px;
}

.search {
    padding: 8px;
    border-radius: 6px;
    border: none;
}

.btn {
    background: #1e1e1e;
    border: none;
    padding: 8px 12px;
    border-radius: 6px;
    color: white;
    cursor: pointer;
}

/* CONTENEDOR */
.container {
    max-width: 900px;
    margin: 40px auto;
}

/* ===== CARD JUEGO ===== */
.game {
    display: flex;
    align-items: center;
    gap: 15px;
    background: #1a1a1a;
    margin-bottom: 15px;
    padding: 10px;
    border-radius: 10px;
    text-decoration: none;
    color: white;
    transition: 0.3s;
    border-left: 4px solid #ff3c00;
}

.game img {
    width: 120px;
    height: 70px;
    object-fit: cover;
    border-radius: 6px;
}

.game:hover {
    background: #222;
    transform: scale(1.02);
}

.game-title {
    font-size: 18px;
}

#noResult {
    display: none;
    color: #ff3c00;
}

.light {
    background: #f2f2f2;
    color: black;
}

.light .game {
    background: #ddd;
    color: black;
}
</style>
</head>

<script>
function toggleTheme() {
    document.body.classList.toggle("light");
}

function limpiarTexto(texto) {
    return texto.toLowerCase().replace(/[^a-z0-9]/g, "");
}

function buscarJuego() {
    let input = document.querySelector(".search").value;
    let filtro = limpiarTexto(input);

    let juegos = document.querySelectorAll(".game");
    let encontrado = false;

    juegos.forEach(juego => {
        let texto = limpiarTexto(juego.innerText);

        if (texto.includes(filtro)) {
            juego.style.display = "flex";
            encontrado = true;
        } else {
            juego.style.display = "none";
        }
    });

    document.getElementById("noResult").style.display = encontrado ? "none" : "block";
}
</script>
